<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miyamura Music</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <h1 class="logo">🎵 MiyaMusic</h1>
        <nav>
          <ul>
            <li class="active">Beranda</li>
            <li>Eksplorasi</li>
            <li>Koleksi</li>
          </ul>
        </nav>
      </aside>

      <main class="main-content">
        <header>
          <h2>Daftar Lagu Kamu</h2>
        </header>

        <div class="song-list" id="song-list"></div>
      </main>
    </div>

    <footer class="bottom-player">
      <div class="player-track-info">
        <img
          id="player-cover"
          src="https://via.placeholder.com/50"
          alt="Cover Album"
        />
        <div class="track-details">
          <h4 id="player-title">Pilih Lagu</h4>
          <p id="player-artist">Artis</p>
        </div>
      </div>

      <div class="player-controls-container">
        <div class="controls">
          <button id="prev-btn" class="ctrl-btn">
            <img
              src="icons/previous.svg"
              alt="Previous"
              width="24"
              height="24"
            />
          </button>

          <button id="play-btn" class="ctrl-btn play-main">
            <img
              src="icons/play-button.svg"
              alt="Play"
              width="40"
              height="40"
              id="play-icon"
            />
          </button>

          <button id="next-btn" class="ctrl-btn">
            <img src="icons/next.svg" alt="Next" width="24" height="24" />
          </button>
        </div>
        <div class="progress-container" id="progress-container">
          <div class="progress" id="progress"></div>
        </div>
      </div>

      <audio id="audio-player" src=""></audio>

      <div class="player-extra">
        <span>🔊</span>
      </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
