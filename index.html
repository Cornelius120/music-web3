<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiyaMusic - Profesional Template</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app-wrapper">
      <aside class="sidebar">
        <h1 class="brand-logo">🎵 MiyaMusic</h1>
        <nav class="nav-menu">
          <ul>
            <li class="active" id="nav-beranda">Beranda</li>
            <li>Eksplorasi</li>
            <li>Koleksi Favorit</li>
          </ul>
        </nav>
      </aside>

      <main class="main-content">
        <div id="home-view">
          <header class="top-header">
            <h2>Daftar Putar Kamu</h2>
          </header>
          <div class="song-list-container" id="song-list"></div>
        </div>

        <div id="detail-view" style="display: none">
          <button id="back-btn" class="back-btn">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <path
                fill="currentColor"
                d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"
              />
            </svg>
            Kembali
          </button>

          <div class="detail-layout">
            <div class="detail-left">
              <img id="detail-cover" src="" alt="Album Cover" />
            </div>
            <div class="detail-right">
              <h2 id="detail-title">Judul Lagu</h2>
              <h3 id="detail-artist">Nama Artis</h3>
              <p id="detail-desc" class="song-desc">
                Deskripsi lagu akan muncul di sini.
              </p>

              <div class="lyrics-section">
                <h4>Lirik</h4>
                <div id="detail-lyrics" class="lyrics-box"></div>
              </div>

              <div class="recommendation-section">
                <h4>Rekomendasi Serupa</h4>
                <div id="recommendation-list" class="song-list-container"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <footer class="bottom-player">
      <div
        class="track-info"
        id="bottom-track-info"
        style="cursor: pointer"
        title="Klik untuk lihat detail"
      >
        <img
          id="player-cover"
          src="https://via.placeholder.com/60"
          alt="Cover Album"
        />
        <div class="track-text">
          <h4 id="player-title">Belum ada lagu</h4>
          <p id="player-artist">Pilih lagu untuk memulai</p>
        </div>
      </div>

      <div class="player-controls">
        <div class="control-buttons">
          <button id="prev-btn" class="btn-icon">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
            </svg>
          </button>
          <button id="play-pause-btn" class="btn-icon btn-main">
            <svg id="icon-play" viewBox="0 0 24 24" width="36" height="36">
              <path fill="currentColor" d="M8 5v14l11-7z" />
            </svg>
            <svg
              id="icon-pause"
              viewBox="0 0 24 24"
              width="36"
              height="36"
              style="display: none"
            >
              <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
          </button>
          <button id="next-btn" class="btn-icon">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <path
                fill="currentColor"
                d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"
              />
            </svg>
          </button>
        </div>
        <div class="progress-wrapper" id="progress-wrapper">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <div class="extra-controls">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path
            fill="currentColor"
            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"
          />
        </svg>
      </div>

      <audio id="audio-player" src=""></audio>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
