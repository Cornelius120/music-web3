<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miyamura Music</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <h1 class="logo">🎵 MiyaMusic</h1>
        <nav>
          <ul>
            <li class="active">Beranda</li>
            <li>Eksplorasi</li>
            <li>Koleksi</li>
          </ul>
        </nav>
      </aside>

      <main class="main-content">
        <header>
          <h2>Daftar Lagu Kamu</h2>
        </header>

        <div class="song-list" id="song-list"></div>
      </main>
    </div>

    <footer class="bottom-player">
      <div class="player-track-info">
        <img
          id="player-cover"
          src="https://via.placeholder.com/50"
          alt="Cover Album"
        />
        <div class="track-details">
          <h4 id="player-title">Pilih Lagu</h4>
          <p id="player-artist">Artis</p>
        </div>
      </div>

      <div class="player-controls-container">
        <div class="controls">
          <button id="prev-btn" class="ctrl-btn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="24"
              height="24"
            >
              <path
                fill="none"
                stroke="#fff"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 20L9 12l10-8v16zM5 19V5"
              ></path>
            </svg>
          </button>

          <button id="play-btn" class="ctrl-btn play-main">
            <svg
              id="icon-play"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 32.93 37.75"
              width="40"
              height="40"
              style="display: block"
            >
              <path
                fill="none"
                stroke="#fff"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.75"
                d="M.88 18.88v-18l15.58 9 15.59 9-15.59 9-15.58 9v-18z"
              ></path>
            </svg>

            <svg
              id="icon-pause"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 28.75 37.75"
              width="40"
              height="40"
              style="display: none"
            >
              <path
                fill="none"
                stroke="#fff"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.75"
                d="M.87.87h9v36h-9zM18.87.87h9v36h-9z"
              ></path>
            </svg>
          </button>

          <button id="next-btn" class="ctrl-btn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="24"
              height="24"
            >
              <path
                fill="none"
                stroke="#fff"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 4l10 8-10 8V4zM19 5v14"
              ></path>
            </svg>
          </button>
        </div>
        <div class="progress-container" id="progress-container">
          <div class="progress" id="progress"></div>
        </div>
      </div>

      <audio id="audio-player" src=""></audio>

      <div class="player-extra">
        <span>🔊</span>
      </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
